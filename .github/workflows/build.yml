name: Build SaninTV (Orochimaru)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: List available Gradle wrapper
        run: |
          java -version
          ls -la gradle/wrapper/

      - name: Build Debug APK (googleDebug)
        run: |
          ./gradlew assembleGoogleDebug --no-daemon --stacktrace 2>&1 | tail -50

      - name: Find APK files
        run: |
          find app/build -name "*.apk" 2>/dev/null || echo "No APKs found"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: SaninTV-googleDebug
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: Build Alpha APK (googleAlpha)
        if: success()
        run: |
          ./gradlew assembleGoogleAlpha --no-daemon --stacktrace 2>&1 | tail -50

      - name: Upload Alpha APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: SaninTV-googleAlpha
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
